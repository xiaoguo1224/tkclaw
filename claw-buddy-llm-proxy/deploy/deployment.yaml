apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawbuddy-llm-proxy
  namespace: clawbuddy-system
  labels:
    app: clawbuddy-llm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawbuddy-llm-proxy
  template:
    metadata:
      labels:
        app: clawbuddy-llm-proxy
    spec:
      imagePullSecrets:
        - name: cr-pull-secret
      containers:
        # LLM Proxy
        - name: llm-proxy
          image: <YOUR_REGISTRY>/<YOUR_NAMESPACE>/clawbuddy-llm-proxy:20260221-ed29c25
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clawbuddy-llm-proxy-secret
                  key: DATABASE_URL
            - name: HTTPS_PROXY
              value: "http://localhost:7890"
            - name: HTTP_PROXY
              value: "http://localhost:7890"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
        # Clash sidecar for outbound proxy
        - name: clash
          image: <YOUR_REGISTRY>/<YOUR_NAMESPACE>/mihomo:v1.19.0
          ports:
            - containerPort: 7890
          volumeMounts:
            - name: clash-config
              mountPath: /root/.config/mihomo
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: clash-config
          configMap:
            name: clawbuddy-llm-proxy-clash
