services:
  postgres:
    platform: linux/amd64
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nodeskclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nodeskclaw}
      POSTGRES_DB: ${POSTGRES_DB:-nodeskclaw}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nodeskclaw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nodeskclaw-backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: nodeskclaw-backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    env_file:
      - ./nodeskclaw-backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_DATA_DIR}:${DOCKER_DATA_DIR}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nodeskclaw:nodeskclaw@postgres:5432/nodeskclaw}
      DATABASE_NAME_SUFFIX: ""
      LLM_PROXY_URL: http://llm-proxy:8080
      LLM_PROXY_INTERNAL_URL: http://llm-proxy:8080
      NODESKCLAW_EDITION: ce
      DOCKER_DATA_DIR: ${DOCKER_DATA_DIR}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  llm-proxy:
    platform: linux/amd64
    build:
      context: nodeskclaw-llm-proxy
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    env_file:
      - ./nodeskclaw-llm-proxy/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nodeskclaw:nodeskclaw@postgres:5432/nodeskclaw}
      # LLM_LOG_CONTENT: "true"
    ports:
      - "${LLM_PROXY_PORT:-8080}:8080"
    restart: unless-stopped

  portal:
    platform: linux/amd64
    build:
      context: nodeskclaw-portal
    depends_on:
      - nodeskclaw-backend
    ports:
      - "${PORTAL_PORT:-80}:80"
    restart: unless-stopped

volumes:
  pg_data:
