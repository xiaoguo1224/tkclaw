services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nodeskclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nodeskclaw}
      POSTGRES_DB: ${POSTGRES_DB:-nodeskclaw}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nodeskclaw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nodeskclaw-backend:
    image: nodesk-center-cn-beijing.cr.volces.com/public/nodeskclaw-backend:${DESKCLAW_VERSION}
    build:
      context: .
      dockerfile: nodeskclaw-backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: ${NODESKCLAW_DATA_DIR:-${HOME:-.}/.nodeskclaw/docker-instances}
        target: /nodeskclaw-data
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nodeskclaw:nodeskclaw@postgres:5432/nodeskclaw}
      DATABASE_NAME_SUFFIX: ""
      LLM_PROXY_URL: http://llm-proxy:8080
      LLM_PROXY_INTERNAL_URL: http://llm-proxy:8080
      NODESKCLAW_EDITION: ce
      DOCKER_DATA_DIR: /nodeskclaw-data
      DOCKER_HOST_DATA_DIR: ${NODESKCLAW_DATA_DIR:-${HOME:-.}/.nodeskclaw/docker-instances}
      # AI 员工回连后端地址（仅管理 Docker 实例时可保持默认 localhost）
      # 若管理远端 K8s 集群上的 AI 员工，必须改为 K8s Pod 可达的外部地址
      AGENT_API_BASE_URL: ${AGENT_API_BASE_URL:-http://localhost:4510/api/v1}
      DEBUG: ${DEBUG:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-base64-key__=}
      INIT_ADMIN_ACCOUNT: ${INIT_ADMIN_ACCOUNT:-admin}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_PORT:-4510}:8000"
    restart: unless-stopped

  llm-proxy:
    image: nodesk-center-cn-beijing.cr.volces.com/public/nodeskclaw-llm-proxy:${DESKCLAW_VERSION}
    build:
      context: nodeskclaw-llm-proxy
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${CODEX_HOME_DIR:-$HOME/.codex}:/root/.codex
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nodeskclaw:nodeskclaw@postgres:5432/nodeskclaw}
      CODEX_HOME: /root/.codex
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${LLM_PROXY_PORT:-4511}:8080"
    restart: unless-stopped

  portal:
    image: nodesk-center-cn-beijing.cr.volces.com/public/nodeskclaw-portal:${DESKCLAW_VERSION}
    build:
      context: nodeskclaw-portal
    depends_on:
      - nodeskclaw-backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${PORTAL_PORT:-80}:80"
    restart: unless-stopped

volumes:
  pg_data:
